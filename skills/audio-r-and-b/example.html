<!DOCTYPE html>
<html>
<head>
  <title>TuneFrames — R&amp;B / Neo-Soul</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
  <div id="tuneframes" style="display:none">{"bpm":86,"duration":"12s"}</div>
  <script>
    // ── Pre-fetch CDN samples (runs in online AudioContext before Tone.Offline) ──
    window.TUNEFRAMES_READY = (async () => {
      const ctx = new AudioContext();
      await ctx.resume();

      // Salamander Grand piano — sharp notation (Ds=D#, Fs=F#)
      const PIANO_NOTES = ['A2','C3','Ds3','Fs3','A3','C4','Ds4','Fs4','A4'];
      const pianoBufs = {};
      for (const note of PIANO_NOTES) {
        const res = await fetch('https://tonejs.github.io/audio/salamander/' + note + '.mp3');
        const arr = await res.arrayBuffer();
        pianoBufs[note] = await ctx.decodeAudioData(arr);
      }
      window._pianoBufs = pianoBufs;

      // FluidR3_GM electric bass — flat notation (Bb, Db, Eb, Ab)
      const BASS_NOTES = ['A1','Bb1','Db2','Eb2','F2','Ab2','B2','C3'];
      const bassBufs = {};
      for (const note of BASS_NOTES) {
        const res = await fetch('https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/electric_bass_finger-mp3/' + note + '.mp3');
        const arr = await res.arrayBuffer();
        bassBufs[note] = await ctx.decodeAudioData(arr);
      }
      window._bassBufs = bassBufs;

      // CR78 drums
      const drumUrls = {
        kick:  'https://tonejs.github.io/audio/drum-samples/CR78/kick.mp3',
        snare: 'https://tonejs.github.io/audio/drum-samples/CR78/snare.mp3',
        hihat: 'https://tonejs.github.io/audio/drum-samples/CR78/hihat.mp3',
      };
      const drumBufs = {};
      for (const [name, url] of Object.entries(drumUrls)) {
        const res = await fetch(url);
        const arr = await res.arrayBuffer();
        drumBufs[name] = await ctx.decodeAudioData(arr);
      }
      window._drumBufs = drumBufs;

      await ctx.close();
    })();

    async function main() {
      await Tone.start();
      await window.TUNEFRAMES_READY;

      Tone.Transport.bpm.value = 86;

      const bar = Tone.Time('1n').toSeconds(); // ~2.79s
      const q   = Tone.Time('4n').toSeconds(); // ~0.698s
      const s8  = Tone.Time('8n').toSeconds(); // ~0.349s
      const s16 = Tone.Time('16n').toSeconds();

      // ── Signal chain: everything → comp → destination ────────────────────
      const comp   = new Tone.Compressor({ threshold: -20, ratio: 3, attack: 0.008, release: 0.18 }).toDestination();
      const reverb = new Tone.Freeverb({ roomSize: 0.72, dampening: 3500, wet: 0.38 }).connect(comp);

      // ── Pad underneath (barely audible warmth) — kept as synth ──────────
      const pad = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: { attack: 2.2, decay: 0.5, sustain: 0.85, release: 5.0 }
      }).connect(reverb);
      pad.volume.value = -24;

      // Hold the tonic throughout
      pad.triggerAttackRelease(['F2','C3','Eb3'], '2n', 0);
      pad.triggerAttackRelease(['Db2','Ab2','C3'], '2n', bar);
      pad.triggerAttackRelease(['Ab2','Eb3','G3'], '2n', bar * 2);
      pad.triggerAttackRelease(['Eb2','Bb2','D3'], '2n', bar * 3);

      // ── Salamander Grand — chorus shimmer + reverb ───────────────────────
      const chorus = new Tone.Chorus({ frequency: 1.5, delayTime: 3.5, depth: 0.4, wet: 0.45 }).connect(reverb);
      chorus.start();

      const pianoUrls = {};
      for (const [note, buf] of Object.entries(window._pianoBufs)) {
        pianoUrls[note] = new Tone.ToneAudioBuffer(buf);
      }
      const piano = new Tone.Sampler({ urls: pianoUrls }).connect(chorus);
      piano.volume.value = -9;

      // Fm9 – Dbmaj9 – Abmaj7 – Ebmaj7 (4-bar loop × 2 passes + variation)
      const changes = [
        { chord: ['F3','Ab3','C4','Eb4','G4'],   time: 0              }, // Fm9
        { chord: ['Db3','F3','Ab3','C4','Eb4'],  time: bar            }, // Dbmaj9
        { chord: ['Ab2','Eb3','G3','C4'],        time: bar * 2        }, // Abmaj7
        { chord: ['Eb3','G3','Bb3','D4'],        time: bar * 3        }, // Ebmaj7
        { chord: ['F3','Ab3','C4','G4'],         time: bar * 4        }, // Fm add9
        { chord: ['Db3','Ab3','C4','F4'],        time: bar * 4 + bar  }, // Dbmaj9/Ab
      ];
      changes
        .sort((a, b) => a.time - b.time)
        .forEach(({ chord, time }) => piano.triggerAttackRelease(chord, '1n', time));

      // ── Electric bass (FluidR3_GM) ────────────────────────────────────────
      const bassUrls = {};
      for (const [note, buf] of Object.entries(window._bassBufs)) {
        bassUrls[note] = new Tone.ToneAudioBuffer(buf);
      }
      const bass = new Tone.Sampler({ urls: bassUrls }).connect(comp);
      bass.volume.value = -5;

      // Neo-soul bass: root on 1, anticipation (16th early) into beat 3, fill at bar end
      const bassPattern = (root, fifth, t) => [
        { note: root,  time: t                    }, // beat 1
        { note: root,  time: t + q + s16          }, // "and-a" of beat 2 (anticipates 3)
        { note: fifth, time: t + q * 2            }, // beat 3
        { note: root,  time: t + q * 3 + s16 * 2 }, // syncopated fill before bar end
      ];

      const bassEvents = [
        ['F2',  'C3',  0              ],
        ['Db2', 'Ab2', bar            ],
        ['Ab1', 'Eb2', bar * 2        ],
        ['Eb2', 'Bb2', bar * 3        ],
        ['F2',  'C3',  bar * 4        ],
        ['Db2', 'Ab2', bar * 4 + bar  ],
      ].flatMap(([root, fifth, t]) => bassPattern(root, fifth, t))
        .sort((a, b) => a.time - b.time);

      bassEvents.forEach(({ note, time }) => bass.triggerAttackRelease(note, '8n', time));

      // ── CR78 Kick (beats 1 & 3, enters bar 2) ────────────────────────────
      const kick = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.kick)).connect(comp);
      kick.volume.value = -14;

      const kickTimes = [];
      for (let rep = 1; rep < 5; rep++) {
        kickTimes.push(rep * bar);           // beat 1
        kickTimes.push(rep * bar + q * 2);   // beat 3
        if (rep % 2 === 0) kickTimes.push(rep * bar + q * 3.5); // syncopated ghost kick
      }
      kickTimes
        .sort((a, b) => a - b)
        .forEach(t => Tone.Transport.schedule(time => kick.start(time), t));

      // ── CR78 Snare on 2 and 4 ─────────────────────────────────────────────
      const snareBp = new Tone.Filter(2600, 'bandpass').connect(reverb);
      const snare   = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.snare)).connect(snareBp);
      snare.volume.value = -20;

      const snareTimes = [];
      for (let rep = 1; rep < 5; rep++) {
        snareTimes.push(rep * bar + q);       // beat 2
        snareTimes.push(rep * bar + q * 3);   // beat 4
      }
      snareTimes
        .sort((a, b) => a - b)
        .forEach(t => Tone.Transport.schedule(time => snare.start(time), t));

      // ── CR78 Hi-hats: 8ths with 16th fill before beat 3 ──────────────────
      const hihat = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.hihat)).connect(reverb);
      hihat.volume.value = -24;

      const hatTimes = [];
      for (let rep = 1; rep < 5; rep++) {
        for (let i = 0; i < 8; i++) hatTimes.push(rep * bar + i * s8); // 8th notes
        hatTimes.push(rep * bar + q * 2 - s16 * 2); // 16th fill into beat 3
        hatTimes.push(rep * bar + q * 2 - s16);
      }
      hatTimes
        .sort((a, b) => a - b)
        .forEach(t => Tone.Transport.schedule(time => hihat.start(time), t));

      // ── Melody (enters bar 3) — smooth synth phrase, kept as synth ───────
      const melDelay = new Tone.FeedbackDelay({ delayTime: '8n', feedback: 0.18, wet: 0.22 }).connect(reverb);
      const melody   = new Tone.Synth({
        oscillator: { type: 'triangle' },
        envelope: { attack: 0.04, decay: 0.35, sustain: 0.5, release: 1.5 }
      }).connect(melDelay);
      melody.volume.value = -13;

      // Silky descending/ascending phrase — Fm pentatonic flavour
      const phrase = [
        { note: 'C5',  time: bar * 2,           dur: '8n'  },
        { note: 'Ab4', time: bar * 2 + s8,      dur: '8n'  },
        { note: 'G4',  time: bar * 2 + s8*2,    dur: '4n'  },
        { note: 'Eb4', time: bar * 2 + s8*4,    dur: '8n'  },
        { note: 'F4',  time: bar * 2 + s8*5,    dur: '4n.' },
        { note: 'G4',  time: bar * 3 + q,       dur: '8n'  },
        { note: 'Ab4', time: bar * 3 + q + s8,  dur: '8n'  },
        { note: 'C5',  time: bar * 3 + q*2,     dur: '2n'  },
        { note: 'Bb4', time: bar * 4 + s8,      dur: '4n'  },
        { note: 'Ab4', time: bar * 4 + s8*3,    dur: '4n'  },
        { note: 'G4',  time: bar * 4 + s8*5,    dur: '2n'  },
      ];
      phrase
        .sort((a, b) => a.time - b.time)
        .forEach(({ note, time, dur }) => melody.triggerAttackRelease(note, dur, time));
    }
  </script>
</body>
</html>
