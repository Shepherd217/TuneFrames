<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TuneFrames — Boom Bap Hip Hop</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
  <!-- TuneFrames Metadata — must be JSON textContent, not data attributes -->
  <div id="tuneframes" style="display:none">{"bpm":88,"duration":"12s"}</div>

  <script>
    // Pre-fetch CDN samples before Tone.Offline starts — Offline context cannot fetch URLs
    window.TUNEFRAMES_READY = (async () => {
      const ctx = new AudioContext();
      await ctx.resume();

      // CR78 drum samples
      const drumUrls = {
        kick:  'https://tonejs.github.io/audio/drum-samples/CR78/kick.mp3',
        snare: 'https://tonejs.github.io/audio/drum-samples/CR78/snare.mp3',
        hihat: 'https://tonejs.github.io/audio/drum-samples/CR78/hihat.mp3',
      };
      const drumBufs = {};
      for (const [name, url] of Object.entries(drumUrls)) {
        const res = await fetch(url);
        const arr = await res.arrayBuffer();
        drumBufs[name] = await ctx.decodeAudioData(arr);
      }
      window._drumBufs = drumBufs;

      // FluidR3_GM electric_bass_finger — flat notation, confirmed 200 OK
      const BASS_NOTES = ['A1', 'Bb1', 'C2', 'D2', 'Eb2', 'G2', 'A2'];
      const bassBufs = {};
      for (const note of BASS_NOTES) {
        const res = await fetch(
          'https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/electric_bass_finger-mp3/' + note + '.mp3'
        );
        const arr = await res.arrayBuffer();
        bassBufs[note] = await ctx.decodeAudioData(arr);
      }
      window._bassBufs = bassBufs;

      await ctx.close();
    })();

    async function main() {
      await Tone.start();
      await window.TUNEFRAMES_READY;

      // Set BPM so Tone.Time string values resolve correctly
      Tone.Transport.bpm.value = 88;

      const beat = Tone.Time("4n").toSeconds(); // ~0.682s at 88 BPM
      const s16  = beat / 4;                    // 16th note ~0.170s
      const bar  = beat * 4;                    // 1 bar ~2.727s
      const numBars = 4;                        // 4 bars ~10.9s (fits in 12s)

      // --- MASTER BUS ---
      const masterLimiter = new Tone.Limiter(-1).toDestination();
      const masterGain    = new Tone.Gain(0.82).connect(masterLimiter);

      // --- KICK (CR78 sample via Tone.Player) ---
      const kickDist = new Tone.Distortion({ distortion: 0.2, wet: 0.4 }).connect(masterGain);
      const kickGain = new Tone.Gain(0.88).connect(kickDist);
      const kick = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.kick)).connect(kickGain);

      // --- SNARE (CR78 sample via Tone.Player, keep reverb chain) ---
      const snareVerb = new Tone.Reverb({ decay: 1.8, wet: 0.5 }).connect(masterGain);
      const snareGain = new Tone.Gain(0.52).connect(snareVerb);
      const snare = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.snare)).connect(snareGain);

      // --- HI-HAT (CR78 sample via Tone.Player) ---
      const hatGain = new Tone.Gain(0.28).connect(masterGain);
      const hihat = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.hihat)).connect(hatGain);

      // --- BASS (FluidR3_GM electric_bass_finger via Tone.Sampler) ---
      const bassGain = new Tone.Gain(0.7).connect(masterGain);
      const bassUrls = {};
      for (const [note, buf] of Object.entries(window._bassBufs)) {
        bassUrls[note] = new Tone.ToneAudioBuffer(buf);
      }
      const bass = new Tone.Sampler({ urls: bassUrls }).connect(bassGain);

      // --- SOUL PAD — warm PolySynth, slow attack (keep as synth) ---
      const padVerb = new Tone.Reverb({ decay: 3.5, wet: 0.5 }).connect(masterGain);
      const padGain = new Tone.Gain(0.35).connect(padVerb);
      const pad     = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.6, decay: 0.5, sustain: 0.7, release: 2.0 }
      }).connect(padGain);

      // --- KICK PATTERN — beat 1, "and" of 2, beat 3 (classic boom bap) ---
      // Collect times, sort chronologically, then schedule
      const kickTimes = [];
      for (let b = 0; b < numBars; b++) {
        [0, 6, 8].forEach(step => kickTimes.push(b * bar + step * s16));
      }
      kickTimes.sort((a, b) => a - b);
      kickTimes.forEach(t => kick.start(t));

      // --- SNARE — strictly beats 2 and 4 (steps 4 and 12) ---
      const snareTimes = [];
      for (let b = 0; b < numBars; b++) {
        [4, 12].forEach(step => snareTimes.push(b * bar + step * s16));
      }
      snareTimes.sort((a, b) => a - b);
      snareTimes.forEach(t => snare.start(t));

      // --- HI-HAT — all 16 steps per bar ---
      const hihatTimes = [];
      for (let b = 0; b < numBars; b++) {
        for (let s = 0; s < 16; s++) {
          hihatTimes.push(b * bar + s * s16);
        }
      }
      hihatTimes.sort((a, b) => a - b);
      hihatTimes.forEach(t => hihat.start(t));

      // --- BASS LINE — Fm vamp: 2-bar phrase played twice ---
      const bassPhrase = [
        { step: 0,  note: "F1",  dur: beat },
        { step: 4,  note: "F1",  dur: beat * 0.5 },
        { step: 6,  note: "C2",  dur: beat * 0.5 },
        { step: 8,  note: "Eb2", dur: beat * 0.5 },
        { step: 10, note: "D2",  dur: beat * 0.5 },
        { step: 12, note: "C2",  dur: beat },
        { step: 16, note: "Bb1", dur: beat },
        { step: 20, note: "Bb1", dur: beat * 0.5 },
        { step: 22, note: "F1",  dur: beat * 0.5 },
        { step: 24, note: "Ab1", dur: beat * 0.5 },
        { step: 26, note: "G1",  dur: beat * 0.5 },
        { step: 28, note: "F1",  dur: beat },
      ];
      const bassEvents = [];
      for (let phrase = 0; phrase < 2; phrase++) {
        bassPhrase.forEach(({ step, note, dur }) => {
          bassEvents.push({ note, dur, t: phrase * 2 * bar + step * s16 });
        });
      }
      bassEvents.sort((a, b) => a.t - b.t);
      bassEvents.forEach(e => bass.triggerAttackRelease(e.note, e.dur, e.t));

      // --- SOUL PAD — Fm7 bars 0-1, Bbm7 bars 2-3 ---
      pad.triggerAttackRelease(["F3","Ab3","C4","Eb4"],  bar * 2, 0);
      pad.triggerAttackRelease(["Bb2","Db3","F3","Ab3"], bar * 2, bar * 2);
    }

    main();
  </script>
</body>
</html>
