<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TuneFrames — Boom Bap Hip Hop</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
  <!-- TuneFrames Metadata -->
  <div id="tuneframes"
    data-bpm="88"
    data-duration="12s"
    data-genre="hip-hop"
    data-key="F minor"
    style="display:none">
  </div>

  <script>
    async function main() {
      await Tone.start();
      Tone.Transport.bpm.value = 88;
      Tone.Transport.swing = 0.5;
      Tone.Transport.swingSubdivision = "16n";

      // --- MASTER BUS ---
      const masterLimiter = new Tone.Limiter(-1).toDestination();
      const masterGain = new Tone.Gain(0.82).connect(masterLimiter);

      // --- KICK — punchy MembraneSynth with slight saturation ---
      const kickDist = new Tone.Distortion({ distortion: 0.2, wet: 0.4 }).connect(masterGain);
      const kickGain = new Tone.Gain(0.88).connect(kickDist);
      const kick = new Tone.MembraneSynth({
        pitchDecay: 0.07,
        octaves: 6,
        envelope: { attack: 0.001, decay: 0.32, sustain: 0, release: 0.1 }
      }).connect(kickGain);

      // --- SNARE — white noise with long reverb tail (the "room" sound) ---
      const snareVerb = new Tone.Reverb({ decay: 1.8, wet: 0.5 }).connect(masterGain);
      const snareGain = new Tone.Gain(0.52).connect(snareVerb);
      const snare = new Tone.NoiseSynth({
        noise: { type: "white" },
        envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.06 }
      }).connect(snareGain);

      // --- HI-HAT — MetalSynth, short and crisp ---
      const hatGain = new Tone.Gain(0.28).connect(masterGain);
      const hat = new Tone.MetalSynth({
        frequency: 500,
        envelope: { attack: 0.001, decay: 0.04, release: 0.01 },
        harmonicity: 5.1,
        modulationIndex: 24,
        resonance: 4000,
        octaves: 1.2
      }).connect(hatGain);

      // --- BASS — MonoSynth, smooth with filter envelope ---
      const bassGain = new Tone.Gain(0.7).connect(masterGain);
      const bass = new Tone.MonoSynth({
        oscillator: { type: "sawtooth" },
        filter: { Q: 2, type: "lowpass", rolloff: -12 },
        filterEnvelope: {
          attack: 0.01, decay: 0.2, sustain: 0.4, release: 0.3,
          baseFrequency: 120, octaves: 1.5
        },
        envelope: { attack: 0.01, decay: 0.15, sustain: 0.7, release: 0.3 },
        volume: -2
      }).connect(bassGain);

      // --- SOUL PAD — warm PolySynth, slow attack = reverse-sample texture ---
      const padVerb = new Tone.Reverb({ decay: 3.5, wet: 0.5 }).connect(masterGain);
      const padGain = new Tone.Gain(0.35).connect(padVerb);
      const pad = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.6, decay: 0.5, sustain: 0.7, release: 2.0 },
        volume: 0
      }).connect(padGain);

      // --- KICK PATTERN — beat 1, "and" of 2, beat 3 (classic boom bap) ---
      const kickSeq = new Tone.Sequence((time, val) => {
        if (val) kick.triggerAttackRelease("C1", "8n", time);
      }, ["C1",null,null,null,null,null,"C1",null,"C1",null,null,null,null,null,null,null], "16n");
      kickSeq.start(0);

      // --- SNARE — strictly beats 2 and 4 ---
      const snareSeq = new Tone.Sequence((time, val) => {
        if (val) snare.triggerAttackRelease("8n", time);
      }, [null,null,null,null,1,null,null,null,null,null,null,null,1,null,null,null], "16n");
      snareSeq.start(0);

      // --- HI-HAT — all 16ths, swing does the shuffle; velocity variation adds humanity ---
      const hatVels = [0.9,0.45,0.85,0.4,0.9,0.45,0.85,0.4,0.9,0.45,0.9,0.4,0.85,0.45,0.9,0.45];
      let hatStep = 0;
      const hatSeq = new Tone.Sequence((time) => {
        hat.triggerAttackRelease("16n", time, hatVels[hatStep % 16]);
        hatStep++;
      }, new Array(16).fill(1), "16n");
      hatSeq.start(0);

      // --- BASS LINE — smooth Fm vamp: F1 C2 Eb2 Bb1 with movement ---
      const bassNotes = [
        { time: "0:0:0", note: "F1", dur: "4n" },
        { time: "0:1:0", note: "F1", dur: "8n" },
        { time: "0:1:2", note: "C2", dur: "8n" },
        { time: "0:2:0", note: "Eb2", dur: "8n" },
        { time: "0:2:2", note: "D2",  dur: "8n" },
        { time: "0:3:0", note: "C2",  dur: "4n" },

        { time: "1:0:0", note: "Bb1", dur: "4n" },
        { time: "1:1:0", note: "Bb1", dur: "8n" },
        { time: "1:1:2", note: "F1",  dur: "8n" },
        { time: "1:2:0", note: "Ab1", dur: "8n" },
        { time: "1:2:2", note: "G1",  dur: "8n" },
        { time: "1:3:0", note: "F1",  dur: "4n" },
      ];
      const bassPart = new Tone.Part((time, val) => {
        bass.triggerAttackRelease(val.note, val.dur, time);
      }, bassNotes.map(({ time, note, dur }) => [time, { note, dur }]));
      bassPart.loopEnd = "2m";
      bassPart.loop = true;
      bassPart.start("2m"); // bass enters bar 3

      // --- SOUL PAD — Fm7 chord, slow attack, enters bar 3 ---
      // Fm7: F Ab C Eb — warm and dusty
      const padEvents = [
        { time: "2m",  notes: ["F3","Ab3","C4","Eb4"] },
        { time: "4m",  notes: ["Bb2","Db3","F3","Ab3"] }, // Bbm7
        { time: "6m",  notes: ["F3","Ab3","C4","Eb4"] },  // back to Fm7
      ];
      padEvents.forEach(({ time, notes }) => {
        pad.triggerAttackRelease(notes, "2m", time);
      });

      // --- START & STOP ---
      Tone.Transport.start();
      Tone.Transport.stop("+12");
    }

    main();
  </script>
</body>
</html>
