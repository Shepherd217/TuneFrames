<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TuneFrames — Trap</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
  <!-- TuneFrames Metadata -->
  <div id="tuneframes" style="display:none">{"bpm":140,"duration":"12s"}</div>

  <script>
    // Pre-fetch CDN samples in an online AudioContext before Tone.Offline starts.
    // Tone.Offline cannot fetch URLs, so all network I/O must complete here first.
    window.TUNEFRAMES_READY = (async () => {
      const ctx = new AudioContext();
      await ctx.resume();

      // CR78 drum samples (tonejs CDN, confirmed 200 OK)
      const drumUrls = {
        kick:  'https://tonejs.github.io/audio/drum-samples/CR78/kick.mp3',
        hihat: 'https://tonejs.github.io/audio/drum-samples/CR78/hihat.mp3',
      };
      const drumBufs = {};
      for (const [name, url] of Object.entries(drumUrls)) {
        const res = await fetch(url);
        const arr = await res.arrayBuffer();
        drumBufs[name] = await ctx.decodeAudioData(arr);
      }
      window._drumBufs = drumBufs;

      // Electric bass finger — gleitz FluidR3_GM (FLAT notation required: Bb, Eb, Gb, Ab)
      const BASS_NOTES = ['A1', 'C2', 'Eb2', 'Gb2', 'A2', 'C3'];
      const bassBufs = {};
      for (const note of BASS_NOTES) {
        const res = await fetch(
          `https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/electric_bass_finger-mp3/${note}.mp3`
        );
        const arr = await res.arrayBuffer();
        bassBufs[note] = await ctx.decodeAudioData(arr);
      }
      window._bassBufs = bassBufs;

      await ctx.close();
    })();

    async function main() {
      await Tone.start();
      // Wait for all CDN samples to be decoded before entering Tone.Offline
      await window.TUNEFRAMES_READY;

      Tone.Transport.bpm.value = 140;

      // --- MASTER BUS ---
      const masterLimiter = new Tone.Limiter(-1).toDestination();
      const masterGain = new Tone.Gain(0.85).connect(masterLimiter);

      await Tone.Offline(async () => {
        // --- 808 SUB — MembraneSynth with long pitchDecay for the signature glide ---
        const subSaturate = new Tone.Distortion({ distortion: 0.12, wet: 0.25 }).connect(masterGain);
        const subGain = new Tone.Gain(1.1).connect(subSaturate);
        const sub = new Tone.MembraneSynth({
          pitchDecay: 0.48,   // the 808 "fall" — longer = more dramatic
          octaves: 3,          // pitch range of the glide
          envelope: { attack: 0.001, decay: 1.1, sustain: 0, release: 0.5 }
        }).connect(subGain);

        // --- CR78 KICK — real sample for transient punch on each 808 downbeat ---
        const kickGain = new Tone.Gain(0.8).connect(masterGain);
        const kick = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.kick)).connect(kickGain);

        // --- ELECTRIC BASS FINGER — real samples, mirrors 808 sub for low-end definition ---
        const bassGain = new Tone.Gain(0.7).connect(masterGain);
        const bassUrls = {};
        for (const [note, buf] of Object.entries(window._bassBufs)) {
          bassUrls[note] = new Tone.ToneAudioBuffer(buf);
        }
        const bass = new Tone.Sampler({ urls: bassUrls }).connect(bassGain);

        // --- SNARE — punchy white noise, dry ---
        const snareVerb = new Tone.Reverb({ decay: 0.7, wet: 0.18 }).connect(masterGain);
        const snareGain = new Tone.Gain(0.7).connect(snareVerb);
        const snare = new Tone.NoiseSynth({
          noise: { type: "white" },
          envelope: { attack: 0.001, decay: 0.16, sustain: 0, release: 0.05 }
        }).connect(snareGain);

        // --- CR78 HI-HAT — real sample replacing MetalSynth ---
        const hatGain = new Tone.Gain(0.38).connect(masterGain);
        const hat = new Tone.Player(new Tone.ToneAudioBuffer(window._drumBufs.hihat)).connect(hatGain);

        // --- STRINGS — atmospheric PolySynth, heavy reverb ---
        const stringsVerb = new Tone.Reverb({ decay: 4.5, wet: 0.65 }).connect(masterGain);
        const stringsGain = new Tone.Gain(0.5).connect(stringsVerb);
        const strings = new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: "sawtooth4" },
          envelope: { attack: 0.5, decay: 1.2, sustain: 0.65, release: 2.0 },
          volume: -2
        }).connect(stringsGain);

        // --- 808 PATTERN — half-time feel, beat 1 of every bar ---
        // Pattern: hit on beat 1, ghost on beat 3.5
        const subPattern = new Tone.Sequence((time, note) => {
          if (note === "C2") {
            sub.triggerAttackRelease("C2", "2n", time);
          } else if (note === "G1") {
            sub.triggerAttackRelease("G1", "4n", time);
          }
        }, ["C2", null, null, null, null, null, "G1", null,
            "C2", null, null, null, null, null, null, null], "16n");
        subPattern.start(0);

        // --- BASS PATTERN — electric finger bass mirrors 808 sub for attack definition ---
        // A1 substitutes for G1 (G1 is below the gleitz sample floor at A1;
        // the Sampler pitch-shifts A1 down to cover it)
        const bassPattern = new Tone.Sequence((time, note) => {
          if (note === "C2") {
            bass.triggerAttackRelease("C2", "2n", time);
          } else if (note === "A1") {
            bass.triggerAttackRelease("A1", "4n", time);
          }
        }, ["C2", null, null, null, null, null, "A1", null,
            "C2", null, null, null, null, null, null, null], "16n");
        bassPattern.start(0);

        // --- KICK PATTERN — CR78 on the 808 downbeats (steps 0 and 8 per bar) ---
        const kickSeq = new Tone.Sequence((time, val) => {
          if (val) kick.start(time);
        }, [1, null, null, null, null, null, null, null,
            1, null, null, null, null, null, null, null], "16n");
        kickSeq.start(0);

        // --- SNARE PATTERN — half-time: beat 3 of the bar (step 8 of 16) ---
        const snareSeq = new Tone.Sequence((time, val) => {
          if (val) snare.triggerAttackRelease("16n", time);
        }, [null, null, null, null, null, null, null, null,
            1, null, null, null, null, null, null, null], "16n");
        snareSeq.start(0);

        // --- HI-HAT ROLLS — CR78 sample, same evolving velocity map as original ---
        // 32nd-note grid: velocity variation shape preserved; Player triggers on vel > 0
        // Bar 1-2 velocity map: sparse 16th pattern (every 2 32nds)
        const hatBar1 = [
          0.8, 0,   0.4, 0,   0.8, 0,   0.4, 0,
          0.8, 0,   0.4, 0,   0.8, 0.3, 0.9, 0.3
        ];
        // Bar 3-4: 16th rolls with triplet accent flurry
        const hatBar2 = [
          0.8, 0.3, 0.6, 0.2, 0.8, 0.3, 0.5, 0.2,
          0.7, 0.3, 0.6, 0.2, 0.9, 0.5, 0.8, 0.5
        ];
        // Bar 5-6: dense 32nd roll building to drop
        const hatBar3 = [
          0.6, 0.3, 0.7, 0.3, 0.6, 0.4, 0.8, 0.3,
          0.6, 0.4, 0.7, 0.5, 0.8, 0.6, 0.9, 0.7
        ];

        // Merge all bars into one 96-step (6-bar) loop for 32nds at 140bpm
        const fullHatPattern = [...hatBar1, ...hatBar1, ...hatBar2, ...hatBar2, ...hatBar3, ...hatBar3];

        const hatSeq = new Tone.Sequence((time, vel) => {
          if (vel > 0) hat.start(time);
        }, fullHatPattern, "32n");
        hatSeq.start(0);

        // --- STRINGS — atmospheric minor chord, enters at bar 3 ---
        // Cm: C3-Eb3-G3-Bb3 + resolution chord
        strings.triggerAttackRelease(["C3", "Eb3", "G3", "Bb3"], "2m", "2m");
        strings.triggerAttackRelease(["Ab2", "C3", "Eb3", "G3"], "2m", "4m");
        strings.triggerAttackRelease(["C3", "Eb3", "G3", "Bb3"], "2m", "6m");

        Tone.Transport.start();
      }, 12);
    }

    main();
  </script>
</body>
</html>
