<div id="tuneframes" style="display:none">{"bpm":80,"duration":"14s"}</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
// TuneFrames — Orchestral
// D minor: strings carry melody, brass confirm harmony,
// woodwinds add color, timpani on downbeats
// Proper voice leading — each section has a role

async function main() {
  await Tone.start();

  Tone.Transport.bpm.value = 80;

  const beat = 60 / 80;     // 0.75s per quarter note
  const half = beat * 2;    // 1.5s per half note

  // ── Hall reverb — all orchestral sound happens in a hall ──────────────────
  const reverb = new Tone.Reverb({ decay: 3.5, preDelay: 0.05, wet: 0.7 });
  await reverb.generate();
  reverb.toDestination();

  // ── STRINGS — PolySynth triangle, slow bow-attack ─────────────────────────
  const strings = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.75, decay: 0.2, sustain: 0.95, release: 1.5 },
    volume: -5,
  });
  strings.connect(reverb);

  // ── BRASS — PolySynth sawtooth, medium breath-attack ─────────────────────
  const brass = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.32, decay: 0.35, sustain: 0.72, release: 1.0 },
    volume: -10,
  });
  brass.connect(reverb);

  // ── WOODWINDS — AMSynth for reedy, breathy character ─────────────────────
  const woodwinds = new Tone.AMSynth({
    harmonicity: 1.0,
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.14, decay: 0.1, sustain: 0.88, release: 0.6 },
    modulation: { type: 'square' },
    modulationEnvelope: { attack: 0.5, decay: 0.0, sustain: 0.3, release: 0.5 },
    volume: -16,
  });
  woodwinds.connect(reverb);

  // ── TIMPANI — MembraneSynth, long resonating pitch ───────────────────────
  const timpani = new Tone.MembraneSynth({
    pitchDecay: 0.38, octaves: 5,
    envelope: { attack: 0.001, decay: 1.6, sustain: 0, release: 1.0 },
    volume: -7,
  });
  timpani.connect(reverb);

  // ─────────────────────────────────────────────────────────────────────────
  // PHRASE 1 (0-6s): Statement — strings introduce D minor melody
  // D minor scale ascending: D E F G A Bb A G
  // Strings move by step (good voice leading), brass hold tonic
  // ─────────────────────────────────────────────────────────────────────────

  // Strings: 8th-note melodic line in right register
  const phrase1 = [
    { note: 'D4',  t: 0 },
    { note: 'E4',  t: beat * 0.5 },
    { note: 'F4',  t: beat * 1 },
    { note: 'G4',  t: beat * 1.5 },
    { note: 'A4',  t: beat * 2 },
    { note: 'Bb4', t: beat * 2.5 },
    { note: 'A4',  t: beat * 3 },
    { note: 'G4',  t: beat * 3.5 },
  ];
  phrase1.forEach(({ note, t }) => {
    Tone.Transport.scheduleOnce((time) => {
      strings.triggerAttackRelease(note, '4n', time);
    }, t);
  });

  // Brass: hold tonic Dm (D3 + A3) for first 3 beats, then IV (Gm) for 3 beats
  Tone.Transport.scheduleOnce((t) => {
    brass.triggerAttackRelease(['D3', 'F3', 'A3'], half, t);
  }, 0);
  Tone.Transport.scheduleOnce((t) => {
    brass.triggerAttackRelease(['G2', 'Bb2', 'D3'], half, t);
  }, beat * 3);

  // Timpani: downbeat on D2 at bar 1 start
  Tone.Transport.scheduleOnce((t) => {
    timpani.triggerAttackRelease('D2', '8n', t);
  }, 0);

  // ─────────────────────────────────────────────────────────────────────────
  // PHRASE 2 (6-10s): Response — melody rises, woodwinds fill between strings
  // Half-cadence: ends on A major (the V chord) — tension before resolution
  // ─────────────────────────────────────────────────────────────────────────

  const p2start = beat * 8; // 6s

  // Strings: rising line toward climax, now with wider intervals
  const phrase2 = [
    { note: 'F4',  t: p2start },
    { note: 'A4',  t: p2start + beat * 0.5 },
    { note: 'C5',  t: p2start + beat * 1 },
    { note: 'D5',  t: p2start + beat * 1.5 },
    { note: 'E5',  t: p2start + beat * 2 },
    { note: 'F5',  t: p2start + beat * 2.5 },
  ];
  phrase2.forEach(({ note, t }) => {
    Tone.Transport.scheduleOnce((time) => {
      strings.triggerAttackRelease(note, '4n', time);
    }, t);
  });

  // Woodwinds: fill the harmony gaps between string notes
  // They hold the inner voices (3rd and 5th) that strings don't play
  const woodwindNotes = [
    { note: 'A4', t: p2start + beat * 0.25 },
    { note: 'C5', t: p2start + beat * 1.25 },
    { note: 'F4', t: p2start + beat * 2.25 },
  ];
  woodwindNotes.forEach(({ note, t }) => {
    Tone.Transport.scheduleOnce((time) => {
      woodwinds.triggerAttackRelease(note, '4n', time);
    }, t);
  });

  // Brass: IV (Bb) → V (A major) — building to the half cadence
  Tone.Transport.scheduleOnce((t) => {
    brass.triggerAttackRelease(['Bb2', 'D3', 'F3'], half, t);
  }, p2start);
  Tone.Transport.scheduleOnce((t) => {
    // A major (V in D minor) — the leading chord, needs resolution
    brass.triggerAttackRelease(['A2', 'C#3', 'E3'], half, t);
  }, p2start + beat * 3);

  // Timpani: emphasizes the IV-V shift
  Tone.Transport.scheduleOnce((t) => timpani.triggerAttackRelease('G2', '8n', t), p2start);
  Tone.Transport.scheduleOnce((t) => timpani.triggerAttackRelease('A2', '8n', t), p2start + beat * 3);

  // ─────────────────────────────────────────────────────────────────────────
  // PHRASE 3 (10-14s): Resolution — full cadence I (Dm), all voices converge
  // V → i: tension resolves back to D minor
  // ─────────────────────────────────────────────────────────────────────────

  const p3start = p2start + beat * 6; // ~10.5s

  // Strings: descend from the climax F5 back to D4 (tonic)
  const phrase3 = [
    { note: 'F5',  t: p3start },
    { note: 'E5',  t: p3start + beat * 0.5 },
    { note: 'D5',  t: p3start + beat * 1 },
    { note: 'C5',  t: p3start + beat * 1.5 },
    { note: 'A4',  t: p3start + beat * 2 },
    { note: 'F4',  t: p3start + beat * 2.5 },
    { note: 'D4',  t: p3start + beat * 3 },
  ];
  phrase3.forEach(({ note, t }) => {
    if (t < 14) {
      Tone.Transport.scheduleOnce((time) => {
        strings.triggerAttackRelease(note, '4n', time);
      }, t);
    }
  });

  // Brass: full Dm chord — resolution, all voices present
  Tone.Transport.scheduleOnce((t) => {
    brass.triggerAttackRelease(['D3', 'F3', 'A3', 'D4'], beat * 4, t);
  }, p3start);

  // Woodwinds: hold the 5th (A) above the brass — completes the voicing
  Tone.Transport.scheduleOnce((t) => {
    woodwinds.triggerAttackRelease('F5', beat * 3, t);
  }, p3start);

  // Timpani: strong roll on D2 — the final downbeat
  Tone.Transport.scheduleOnce((t) => timpani.triggerAttackRelease('D2', '4n', t), p3start);
  Tone.Transport.scheduleOnce((t) => timpani.triggerAttackRelease('D2', '4n', t), p3start + beat * 3);

  Tone.Transport.start();
}

window.renderComposition = async function(wavPath) {
  let attempts = 0;
  while (typeof Tone === 'undefined' && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  if (typeof Tone === 'undefined') throw new Error('Tone not loaded');

  const meta = JSON.parse(document.getElementById('tuneframes').textContent);
  const durationSec = parseFloat(meta.duration) + 2.0;

  const buffer = await Tone.Offline(async () => { await main(); }, durationSec, 1, 44100);
  const wav = audioBufferToWav(buffer);
  window.writeFile(wavPath, Array.from(new Uint8Array(wav)));
  return wav.byteLength;
};
</script>
