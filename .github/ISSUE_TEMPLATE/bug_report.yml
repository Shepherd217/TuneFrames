name: Bug Report
description: Something is broken
labels: [bug]
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what is broken.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `tuneframes render my-file.html --output out.mp3`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output / error message
      description: What actually happened? Paste the full error or output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: TuneFrames version
      placeholder: "tuneframes --version  or  npm show tuneframes version"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: ffmpeg
    attributes:
      label: FFmpeg installed?
      placeholder: "ffmpeg -version"

  - type: textarea
    id: composition
    attributes:
      label: Composition HTML
      description: Paste the HTML that caused the issue (optional but helpful).

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been reported before
          required: true
        - label: I can reproduce this consistently
          required: true
